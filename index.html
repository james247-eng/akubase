<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emesmania — Welcome</title>
<style>

  :root{
    --maroon-deep:   #0A0A0A;
    --maroon:        #141414;
    --maroon-light:  #1F1F1F;
    --cream:         #FFFFFF;
    --gold:          #D9D9D9;
    --gold-dim:      #8A8A8A;
    --text-on-cream: #0A0A0A;

  }

  *{ margin:0; padding:0; box-sizing:border-box; }

  html, body{
    height:100%;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background:var(--maroon-deep);
    overflow:hidden;
    position:relative;
  }
a{
  text-decoration:none;
}
  /* ---------- shared structure ---------- */
.logo{
  position: absolute;
  z-index:3;
  top: 0px;
  left: 20px;
  width: 70px;
  height: auto;
  border-radius: 0px 0px 50px 50px;
}
  .onboarding{
    position:relative;
    width:100%;
    height:100dvh;
    overflow:hidden;
  }

  /* background slideshow — full-bleed images, edge to edge */
  .bg-slideshow{
    position:absolute;
    inset:0;
  }

  .slide{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    object-position:center;
    opacity:0;
    transition:opacity 900ms ease;
    /* placeholder fallback color while real photos load in production */
    background-color:var(--maroon-light);
  }

  .slide.active{ opacity:1; }

  /* bottom gradient overlay — mobile only, gives text/CTA a legible base */
  .overlay{
    position:absolute;
    left:0; right:0; bottom:0;
    height:46%;
    background:linear-gradient(180deg,
      rgba(20,5,5,0)    0%,
      rgba(15,4,4,0.75) 35%,
      rgba(10,2,2,0.96) 100%);
    pointer-events:none;
  }

  .content{
    position:absolute;
    left:0; right:0; bottom:0;
    padding:0 24px 28px;
    z-index:2;
  }

  .wordmark{
    font-size:16px;
    letter-spacing:1.5px;
    color:var(--cream);
    margin-bottom:10px;
  }

  .welcome{
    font-size:14px;
    line-height:1.55;
    color:var(--gold);
    margin-bottom:20px;
    max-width:320px;
  }

  .cta{
    display:block;
    width:100%;
    border:none;
    background:var(--cream);
    color:var(--text-on-cream);
    font-size:15px;
    font-weight:600;
    text-align:center;
    padding:14px 0;
    border-radius:28px;
    cursor:pointer;
    margin-bottom:18px;
  }

  .cta:active{ opacity:0.85; }

  .dots{
    display:flex;
    gap:6px;
    align-items:center;
  }

  .dot{
    width:6px;
    height:6px;
    border-radius:3px;
    background:var(--gold-dim);
    border:none;
    padding:0;
    cursor:pointer;
    transition:width 250ms ease, background 250ms ease;
  }

  .dot.active{
    width:18px;
    background:var(--cream);
  }

  /* ---------- desktop / laptop layout ---------- */

  @media (min-width: 768px){

    html, body{ overflow:auto; }

    .onboarding{
      display:flex;
      height:100vh;
    }

    .bg-slideshow{
      position:relative;
      flex:1 1 62%;
      inset:auto;
    }

    .slide{ inset:0; }

    .overlay{
      /* on desktop the fade runs left-to-right into the panel, not bottom-up */
      inset:0;
      height:auto;
      background:linear-gradient(90deg,
        rgba(20,5,5,0)   70%,
        rgba(15,4,4,0.5) 100%);
    }

    .content{
      position:relative;
      flex:1 1 38%;
      max-width:480px;
      background:var(--maroon-deep);
      display:flex;
      flex-direction:column;
      justify-content:center;
      padding:0 56px;
      inset:auto;
    }

    .wordmark{ font-size:26px; margin-bottom:16px; }

    .welcome{ font-size:15px; margin-bottom:32px; max-width:300px; }

    .cta{
      width:auto;
      min-width:200px;
      display:inline-block;
      padding:14px 40px;
      margin-bottom:20px;
    }

  }

</style>
</head>
<body>
<img src="emes-logo.jpg" alt="Emesmania logo" class="logo">
<div class="onboarding">

  <div class="bg-slideshow" id="bgSlideshow">
    <img class="slide active" src="image2.png" alt="Corduroy jacket with sherpa lining, listed on AKUBASE">
    <img class="slide" src="image1.png" alt="Structured handbag with gold hardware, listed on AKUBASE">
    <img class="slide" src="image.png" alt="Featured resale item, listed on AKUBASE">
  </div>

  <div class="overlay"></div>

  <div class="content">
    <div class="wordmark">Emesmania</div>
    <p class="welcome">DRIVE YOUR OBSESSION —Style is a way to say who you are without having to speak.</p>
    <a href="products.html"><button class="cta" id="ctaBtn">SHOP NOW</button></a>
    <div class="dots" id="dots">
      <button class="dot active" data-index="0" aria-label="Slide 1"></button>
      <button class="dot" data-index="1" aria-label="Slide 2"></button>
      <button class="dot" data-index="2" aria-label="Slide 3"></button>
    </div>
  </div>

</div>

<script>

  const slides   = document.querySelectorAll('.slide');
  const dots     = document.querySelectorAll('.dot');
  const ctaBtn   = document.getElementById('ctaBtn');

  let current = 0;
  let timer   = null;
  const INTERVAL_MS = 4000;

  function goToSlide(index){
    slides[current].classList.remove('active');
    dots[current].classList.remove('active');

    current = index;

    slides[current].classList.add('active');
    dots[current].classList.add('active');
  }

  function nextSlide(){
    const next = (current + 1) % slides.length;
    goToSlide(next);
  }

  function startAutoplay(){
    stopAutoplay();
    timer = setInterval(nextSlide, INTERVAL_MS);
  }

  function stopAutoplay(){
    if (timer) clearInterval(timer);
  }

  // dot navigation — clicking a dot jumps to that slide and resets the timer
  dots.forEach(dot => {
    dot.addEventListener('click', () => {
      const index = parseInt(dot.dataset.index, 10);
      goToSlide(index);
      startAutoplay();
    });
  });

  // swipe support for mobile
  let touchStartX = 0;

  document.querySelector('.onboarding').addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
  }, { passive:true });

  document.querySelector('.onboarding').addEventListener('touchend', e => {
    const touchEndX = e.changedTouches[0].clientX;
    const delta = touchEndX - touchStartX;

    if (Math.abs(delta) > 50){
      if (delta < 0){
        goToSlide((current + 1) % slides.length);
      } else {
        goToSlide((current - 1 + slides.length) % slides.length);
      }
      startAutoplay();
    }
  }, { passive:true });

  ctaBtn.addEventListener('click', () => {
    // hook this up to your router / navigation logic
    // e.g. window.location.href = '/home';
    console.log('CTA clicked — navigate to next screen');
  });

  startAutoplay();

</script>

</body>
</html>
