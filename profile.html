<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emesmania — Profile</title>
<style>
  :root{    --maroon-deep:   #0A0A0A;
    --maroon:        #141414;
    --maroon-light:  #1F1F1F;
    --cream:         #FFFFFF;
    --gold:          #D9D9D9;
    --gold-dim:      #8A8A8A;
    --text-on-cream: #0A0A0A;
 }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{ font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:#f7f7f7; }
  .app{ max-width:520px; margin:0 auto; background:var(--bg); min-height:100vh; padding-bottom:80px; }

  .profile-hero{ padding:28px 18px 22px; display:flex; align-items:center; gap:14px; border-bottom:8px solid #f7f7f7; }
  .avatar{ width:60px;height:60px; border-radius:50%; background:var(--maroon); color:#fff; display:flex; align-items:center; justify-content:center; font-size:1.2rem; font-weight:700; flex-shrink:0; }
  .profile-name{ font-size:1.05rem; font-weight:700; }
  .profile-email{ font-size:0.8rem; color:var(--muted); margin-top:2px; }
  .edit-link{ margin-left:auto; font-size:0.78rem; font-weight:700; color:var(--maroon); background:var(--maroon-tint); padding:7px 12px; border-radius:8px; cursor:pointer; flex-shrink:0; }

  .stat-row{ display:flex; padding:16px 18px; border-bottom:8px solid #f7f7f7; }
  .stat{ flex:1; text-align:center; }
  .stat-num{ font-size:1.15rem; font-weight:800; color:var(--ink); }
  .stat-lbl{ font-size:0.72rem; color:var(--muted); margin-top:2px; }

  .menu-section{ padding:6px 0; border-bottom:8px solid #f7f7f7; }
  .menu-item{ display:flex; align-items:center; gap:14px; padding:15px 18px; cursor:pointer; }
  .menu-item:active{ background:#fafafa; }
  .menu-icon{ width:34px;height:34px; border-radius:9px; background:#f3f3f3; display:flex; align-items:center; justify-content:center; flex-shrink:0; color:var(--ink); }
  .menu-label{ font-size:0.88rem; font-weight:600; flex:1; }
  .menu-chevron{ color:var(--muted); }
  .menu-item.danger .menu-label{ color:var(--danger); }
  .menu-item.danger .menu-icon{ background:#fdeceb; color:var(--danger); }

  .app-version{ text-align:center; font-size:0.72rem; color:var(--muted); padding:20px; }

  .signed-out{ text-align:center; padding:60px 30px; }
  .signed-out p{ font-size:0.88rem; color:var(--muted); margin-bottom:16px; }
  .signed-out button{ background:var(--maroon); color:#fff; border:none; padding:12px 26px; border-radius:10px; font-size:0.85rem; font-weight:700; cursor:pointer; }

  @media (min-width:768px){
    .app{ padding-bottom:0; max-width:640px; }
  }
</style>
</head>
<body>
<div class="app">

  <div id="profileContent" style="display:none;">
    <div class="profile-hero">
      <div class="avatar" id="avatarInitials">—</div>
      <div>
        <div class="profile-name" id="profileName">—</div>
        <div class="profile-email" id="profileEmail">—</div>
      </div>
      <div class="edit-link">Edit</div>
    </div>

    <div class="stat-row">
      <div class="stat"><div class="stat-num" id="statOrders">0</div><div class="stat-lbl">Orders</div></div>
      <div class="stat"><div class="stat-num" id="statWishlist">0</div><div class="stat-lbl">Wishlist</div></div>
      <div class="stat"><div class="stat-num" id="statSpent">₦0</div><div class="stat-lbl">Total Spent</div></div>
    </div>

    <div class="menu-section">
      <div class="menu-item" onclick="window.location.href='/order-history.html'">
        <div class="menu-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 2h6l1 4H8l1-4z"/><path d="M4 6h16l-1.5 14a2 2 0 01-2 1.8H7.5A2 2 0 015.5 20L4 6z"/></svg></div>
        <div class="menu-label">My Orders</div>
        <svg class="menu-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </div>
      <div class="menu-item" onclick="window.location.href='/wishlist.html'">
        <div class="menu-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg></div>
        <div class="menu-label">Wishlist</div>
        <svg class="menu-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </div>
      <div class="menu-item">
        <div class="menu-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 10c0 6-8 12-8 12s-8-6-8-12a8 8 0 0116 0z"/><circle cx="12" cy="10" r="3"/></svg></div>
        <div class="menu-label">Saved Addresses</div>
        <svg class="menu-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </div>
      <div class="menu-item">
        <div class="menu-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg></div>
        <div class="menu-label">Payment Methods</div>
        <svg class="menu-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </div>
    </div>

    <div class="menu-section">
      <div class="menu-item">
        <div class="menu-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8a6 6 0 00-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 01-3.4 0"/></svg></div>
        <div class="menu-label">Notifications</div>
        <svg class="menu-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </div>
      <div class="menu-item">
        <div class="menu-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg></div>
        <div class="menu-label">Help & Support</div>
        <svg class="menu-chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 18l6-6-6-6"/></svg>
      </div>
    </div>

    <div class="menu-section">
      <div class="menu-item danger" id="logoutBtn">
        <div class="menu-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></div>
        <div class="menu-label">Log Out</div>
      </div>
    </div>

    <div class="app-version">Emesmania v1.0.0</div>
  </div>

  <div class="signed-out" id="signedOutState">
    <p>Sign in to view your profile, orders, and saved items.</p>
    <button onclick="window.location.href='/auth.html?redirect=/profile.html'">Sign In</button>
  </div>

  <div id="bottomNavRoot"></div>

</div>

<script type="module">
import { onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { auth } from "./config/firebase-config.js";
import { getOrdersForUser } from "./js/orders.js";
import { getWishlistCount } from "./js/wishlist.js";
import { renderBottomNav } from "./js/bottom-nav.js";

renderBottomNav("profile");

const profileContent = document.getElementById("profileContent");
const signedOutState = document.getElementById("signedOutState");

onAuthStateChanged(auth, async (user) => {
  if (!user) {
    profileContent.style.display = "none";
    signedOutState.style.display = "block";
    return;
  }

  signedOutState.style.display = "none";
  profileContent.style.display = "block";

  const name = user.displayName || "Emesmania Shopper";
  document.getElementById("profileName").textContent = name;
  document.getElementById("profileEmail").textContent = user.email || "";
  document.getElementById("avatarInitials").textContent = initials(name);

  // Wishlist count is instant (localStorage or already-merged Firestore
  // count via the same module used elsewhere in the app).
  document.getElementById("statWishlist").textContent = getWishlistCount();

  // Orders + total spent require a Firestore read.
  const orders = await getOrdersForUser(user.uid);
  document.getElementById("statOrders").textContent = orders.length;
  const totalSpent = orders.reduce((sum, o) => sum + Number(o.total || 0), 0);
  document.getElementById("statSpent").textContent = formatSpent(totalSpent);
});

document.getElementById("logoutBtn").addEventListener("click", async () => {
  await signOut(auth);
  window.location.href = "/products.html";
});

function initials(name) {
  return name.split(" ").map(w => w[0]).join("").slice(0, 2).toUpperCase();
}

function formatSpent(amount) {
  if (amount >= 1000) return "₦" + Math.round(amount / 1000) + "k";
  return "₦" + amount;
}
</script>
</body>
</html>
