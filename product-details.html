<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AKUBASE — Product</title>
<style>
  :root{
    --maroon:#680202;
    --maroon-deep:#4a0101;
    --ink:#1a1a1a;
    --muted:#767676;
    --line:#ececec;
    --bg:#ffffff;
    --success:#2e7d4f;
    --success-bg:#eaf6ef;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
    background:#f3f3f3;
    display:flex;
    justify-content:center;
  }
  .app{
    width:100%;
    max-width:520px;
    background:var(--bg);
    min-height:100vh;
  }

  /* ============ TABLET / DESKTOP — two column split ============ */
  @media (min-width: 768px){
    body{ background:#f3f3f3; }
    .app{
      max-width:1100px;
      margin:32px auto;
      min-height:auto;
      display:grid;
      grid-template-columns: 52% 48%;
      align-items:start;
      border-radius:20px;
      overflow:hidden;
      box-shadow:0 20px 60px -20px rgba(0,0,0,0.15);
    }

    .navbar{
      grid-column:1 / 2;
      position:absolute;
    }

    .gallery{
      grid-column:1 / 2;
      grid-row:1 / 3;
      position:sticky;
      top:32px;
      margin-top:0;
      aspect-ratio:auto;
      height:calc(100vh - 64px);
      max-height:780px;
    }

    .info{
      grid-column:2 / 3;
      padding:36px 40px 0;
      max-height:calc(100vh - 64px);
      overflow-y:auto;
    }

    .related{
      grid-column:2 / 3;
      padding-bottom:24px;
    }

    .sticky-cta{
      grid-column:2 / 3;
      position:static;
      transform:none;
      max-width:none;
      margin-top:20px;
      border-top:none;
      box-shadow:none;
      padding:16px 40px 28px;
    }
  }

  /* ============ TOP NAV — floats over image ============ */
  .navbar{
    position:sticky;
    top:0;
    z-index:20;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:16px 18px 0;
    pointer-events:none;
  }
  .navbar button{
    pointer-events:auto;
    width:38px;height:38px;
    border-radius:50%;
    border:none;
    background:rgba(255,255,255,0.9);
    backdrop-filter:blur(6px);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    box-shadow:0 2px 8px rgba(0,0,0,0.12);
  }
  .navbar .right{ display:flex; gap:10px; }
  .navbar svg{ width:18px; height:18px; }
  .navbar .heart.active svg{ fill:var(--maroon); stroke:var(--maroon); }

  /* ============ GALLERY ============ */
  .gallery{
    position:relative;
    width:100%;
    aspect-ratio: 4/5;
    margin-top:-38px;
    overflow:hidden;
    background:#f0ece7;
  }
  .gallery-track{
    display:flex;
    height:100%;
    transition:transform .5s cubic-bezier(.65,0,.35,1);
  }
  .gallery-slide{
    flex:0 0 100%;
    height:100%;
  }
  .gallery-slide img{
    width:100%;height:100%;object-fit:cover;
  }
  .condition-badge{
    position:absolute;
    top:16px;
    left:16px;
    background:var(--success-bg);
    color:var(--success);
    font-size:0.72rem;
    font-weight:700;
    letter-spacing:0.02em;
    padding:6px 12px;
    border-radius:20px;
    display:flex;
    align-items:center;
    gap:5px;
    z-index:5;
  }
  .condition-badge::before{
    content:'';
    width:6px;height:6px;
    border-radius:50%;
    background:var(--success);
  }
  .sold-overlay{
    position:absolute;
    inset:0;
    background:rgba(255,255,255,0.35);
    z-index:4;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .sold-overlay span{
    background:var(--ink);
    color:#fff;
    font-size:0.85rem;
    font-weight:800;
    letter-spacing:0.08em;
    text-transform:uppercase;
    padding:9px 24px;
    border-radius:8px;
  }
  .gallery-count{
    position:absolute;
    bottom:14px;
    right:14px;
    background:rgba(0,0,0,0.55);
    color:#fff;
    font-size:0.72rem;
    font-weight:600;
    padding:4px 10px;
    border-radius:20px;
    z-index:5;
  }
  .gallery-dots{
    position:absolute;
    bottom:14px;
    left:0; right:0;
    display:flex;
    justify-content:center;
    gap:5px;
    z-index:5;
  }
  .gallery-dots span{
    width:5px;height:5px;border-radius:50%;
    background:rgba(255,255,255,0.5);
    transition:all .2s ease;
  }
  .gallery-dots span.active{
    width:14px;border-radius:3px;
    background:#fff;
  }

  /* ============ INFO ============ */
  .info{
    padding:20px 18px 0;
  }
  .brand-row{
    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    gap:12px;
  }
  .brand{
    font-size:0.78rem;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.06em;
    color:var(--maroon);
    margin-bottom:4px;
  }
  .title{
    font-size:1.15rem;
    font-weight:600;
    color:var(--ink);
    line-height:1.35;
  }
  .stock-pill{
    flex-shrink:0;
    font-size:0.68rem;
    font-weight:700;
    color:var(--maroon);
    background:#fdeceb;
    padding:5px 10px;
    border-radius:20px;
    white-space:nowrap;
  }

  .price-row{
    display:flex;
    align-items:baseline;
    gap:10px;
    margin-top:12px;
  }
  .price{
    font-size:1.4rem;
    font-weight:800;
    color:var(--ink);
  }
  .price-original{
    font-size:0.95rem;
    color:var(--muted);
    text-decoration:line-through;
  }
  .price-save{
    font-size:0.72rem;
    font-weight:700;
    color:var(--success);
    background:var(--success-bg);
    padding:3px 8px;
    border-radius:6px;
  }

  /* ============ CHIPS (size/color) ============ */
  .chip-section{ margin-top:22px; }
  .chip-label{
    font-size:0.78rem;
    font-weight:700;
    color:var(--ink);
    margin-bottom:10px;
  }
  .chip-row{ display:flex; gap:8px; flex-wrap:wrap; }
  .chip{
    padding:8px 16px;
    border-radius:8px;
    border:1.5px solid var(--line);
    font-size:0.85rem;
    font-weight:600;
    color:var(--ink);
    background:#fff;
  }
  .chip.selected{
    border-color:var(--maroon);
    background:#fdeceb;
    color:var(--maroon);
  }

  /* ============ CONDITION REPORT ============ */
  .accordion{
    margin-top:24px;
    border-top:1px solid var(--line);
  }
  .accordion-item{ border-bottom:1px solid var(--line); }
  .accordion-head{
    width:100%;
    background:none;
    border:none;
    padding:16px 0;
    display:flex;
    justify-content:space-between;
    align-items:center;
    cursor:pointer;
    text-align:left;
  }
  .accordion-head span.label{
    font-size:0.92rem;
    font-weight:700;
    color:var(--ink);
    display:flex;
    align-items:center;
    gap:8px;
  }
  .accordion-head .chevron{
    transition:transform .25s ease;
    color:var(--muted);
  }
  .accordion-item.open .chevron{ transform:rotate(180deg); }
  .accordion-body{
    max-height:0;
    overflow:hidden;
    transition:max-height .3s ease;
  }
  .accordion-item.open .accordion-body{ max-height:400px; }
  .accordion-body-inner{ padding-bottom:16px; }

  .condition-list{ list-style:none; }
  .condition-list li{
    display:flex;
    gap:10px;
    font-size:0.85rem;
    color:var(--ink);
    line-height:1.5;
    padding:6px 0;
  }
  .condition-list li::before{
    content:'✓';
    color:var(--success);
    font-weight:700;
    flex-shrink:0;
  }
  .detail-thumbs{
    display:flex;
    gap:8px;
    margin-top:12px;
  }
  .detail-thumbs img{
    width:64px;height:64px;
    border-radius:8px;
    object-fit:cover;
    border:1px solid var(--line);
  }

  .desc-text{
    font-size:0.85rem;
    color:var(--muted);
    line-height:1.6;
  }

  /* ============ RELATED — horizontal scroll ============ */
  .related{ margin-top:8px; padding-bottom:110px; }
  .related-head{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 18px;
    margin-bottom:12px;
  }
  .related-head h3{ font-size:0.95rem; font-weight:700; color:var(--ink); }
  .related-head a{ font-size:0.78rem; color:var(--maroon); font-weight:600; text-decoration:none; }
  .related-scroll{
    display:flex;
    gap:12px;
    overflow-x:auto;
    padding:0 18px;
    scrollbar-width:none;
  }
  .related-scroll::-webkit-scrollbar{ display:none; }

  /* ============ PRODUCT CARD ============ */
  .card{
    flex:0 0 150px;
    width:150px;
    cursor:pointer;
  }
  .card-image{
    position:relative;
    width:100%;
    aspect-ratio:4/5;
    border-radius:12px;
    overflow:hidden;
    background:#f0ece7;
  }
  .card-image img{ width:100%;height:100%;object-fit:cover; }
  .card-condition{
    position:absolute;
    top:8px;left:8px;
    background:rgba(255,255,255,0.92);
    color:var(--success);
    font-size:0.6rem;
    font-weight:700;
    padding:3px 7px;
    border-radius:12px;
  }
  .card-heart{
    position:absolute;
    top:8px;right:8px;
    width:26px;height:26px;
    border-radius:50%;
    background:rgba(255,255,255,0.92);
    display:flex;align-items:center;justify-content:center;
  }
  .card-heart svg{ width:13px;height:13px; }
  .card-body{ padding-top:8px; }
  .card-brand{
    font-size:0.65rem;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:0.04em;
    color:var(--maroon);
  }
  .card-title{
    font-size:0.8rem;
    font-weight:600;
    color:var(--ink);
    line-height:1.3;
    margin-top:2px;
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
  }
  .card-price-row{
    display:flex;
    align-items:baseline;
    gap:6px;
    margin-top:4px;
  }
  .card-price{ font-size:0.85rem; font-weight:800; color:var(--ink); }
  .card-price-original{
    font-size:0.68rem;
    color:var(--muted);
    text-decoration:line-through;
  }

  /* ============ STICKY CTA ============ */
  .sticky-cta{
    position:fixed;
    bottom:0;
    left:50%;
    transform:translateX(-50%);
    width:100%;
    max-width:520px;
    background:#fff;
    border-top:1px solid var(--line);
    padding:12px 18px calc(12px + env(safe-area-inset-bottom));
    display:flex;
    align-items:center;
    gap:14px;
    box-shadow:0 -4px 20px rgba(0,0,0,0.06);
    z-index:30;
  }
  .sticky-price{
    display:flex;
    flex-direction:column;
    flex-shrink:0;
  }
  .sticky-price .label{ font-size:0.65rem; color:var(--muted); font-weight:600; }
  .sticky-price .amount{ font-size:1.05rem; font-weight:800; color:var(--ink); }
  .buy-btn{
    flex:1;
    background:var(--maroon);
    color:#fff;
    border:none;
    padding:15px 20px;
    border-radius:10px;
    font-size:0.95rem;
    font-weight:700;
    cursor:pointer;
  }
</style>
</head>
<body>

<div class="app">

  <!-- ===== NAV ===== -->
  <div class="navbar">
    <button aria-label="Back">
      <svg viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <div class="right">
      <button aria-label="Share">
        <svg viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.6" y1="13.5" x2="15.4" y2="17.5"/><line x1="15.4" y1="6.5" x2="8.6" y2="10.5"/></svg>
      </button>
      <button class="heart" aria-label="Save" id="heartBtn">
        <svg viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2"><path d="M20.8 4.6a5.5 5.5 0 0 0-7.8 0L12 5.6l-1-1a5.5 5.5 0 0 0-7.8 7.8l1 1L12 21l7.8-7.6 1-1a5.5 5.5 0 0 0 0-7.8z"/></svg>
      </button>
    </div>
  </div>

  <!-- ===== GALLERY ===== -->
  <div class="gallery" id="gallery">
    <div class="gallery-track" id="galleryTrack"></div>
    <div class="condition-badge" id="conditionBadge">Excellent</div>
    <div class="sold-overlay" id="soldOverlay" style="display:none;"><span>Sold Out</span></div>
    <div class="gallery-dots" id="galleryDots"></div>
  </div>

  <!-- ===== INFO ===== -->
  <div class="info">
    <div class="brand-row">
      <div>
        <div class="brand" id="brandLabel">Loading…</div>
        <div class="title" id="titleLabel"></div>
      </div>
      <div class="stock-pill" id="stockPill">Only 1 left</div>
    </div>

    <div class="price-row">
      <span class="price" id="priceNow"></span>
      <span class="price-original" id="priceOriginal"></span>
      <span class="price-save" id="priceSave" style="display:none;"></span>
    </div>

    <!-- Size is informational only — one unit, one size, no selector needed -->
    <div class="chip-section">
      <div class="chip-label">Size</div>
      <div class="chip-row">
        <div class="chip selected" id="sizeDisplay" style="pointer-events:none;">—</div>
      </div>
    </div>

    <!-- ===== ACCORDION ===== -->
    <div class="accordion">
      <div class="accordion-item open">
        <button class="accordion-head" data-accordion>
          <span class="label">🔍 Condition Report</span>
          <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#767676" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <div class="accordion-body">
          <div class="accordion-body-inner">
            <ul class="condition-list" id="conditionList"></ul>
            <div class="detail-thumbs" id="detailThumbs"></div>
          </div>
        </div>
      </div>

      <div class="accordion-item">
        <button class="accordion-head" data-accordion>
          <span class="label">Description</span>
          <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#767676" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <div class="accordion-body">
          <div class="accordion-body-inner">
            <p class="desc-text" id="descText"></p>
          </div>
        </div>
      </div>

      <div class="accordion-item">
        <button class="accordion-head" data-accordion>
          <span class="label">Shipping & Returns</span>
          <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#767676" stroke-width="2"><path d="M6 9l6 6 6-6"/></svg>
        </button>
        <div class="accordion-body">
          <div class="accordion-body-inner">
            <p class="desc-text">Ships within Lagos in 1–2 days. Nationwide delivery 3–5 days. Since every item is one of one, all sales are final once shipped — please review the condition report carefully before ordering.</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ===== RELATED — using the same product card ===== -->
  <div class="related">
    <div class="related-head">
      <h3>You may also like</h3>
      <a href="/products.html">See all</a>
    </div>
    <div class="related-scroll" id="relatedScroll"></div>
  </div>

  <!-- ===== STICKY CTA ===== -->
  <div class="sticky-cta">
    <div class="sticky-price">
      <span class="label">Price</span>
      <span class="amount" id="stickyPrice">₦0</span>
    </div>
    <button class="buy-btn" id="buyBtn">Add to Bag</button>
  </div>

</div>

<script type="module">
import { listenToProduct, incrementProductViews, getLiveProducts } from "./js/products.js";
import { addToCart } from "./js/cart.js";
import { isWishlisted, toggleWishlist } from "./js/wishlist.js";
import { trackProductView } from "./js/recent-viewed.js";
import { initBadges } from "./js/badges.js";
import { attachAuthModalTriggers } from "./js/auth.js";

initBadges();

// ---- get product id from the URL, e.g. product.html?id=abc123 ----
const params = new URLSearchParams(window.location.search);
const productId = params.get("id");

if (!productId) {
  document.querySelector(".info").innerHTML =
    '<p style="padding:40px 0;text-align:center;color:#767676;">No product specified.</p>';
} else {
  // Track this view locally (for the Recently Viewed rail elsewhere)
  // and remotely (for the admin Views column) — fire-and-forget, no need to await.
  trackProductView(productId);
  incrementProductViews(productId);

  // Live listener — catches a mid-view sale (status flips to 'sold')
  // without needing a page refresh.
  const unsubscribe = listenToProduct(productId, renderProduct);
  window.addEventListener("beforeunload", unsubscribe);
}

let currentProduct = null;

function renderProduct(product) {
  currentProduct = product;

  if (!product) {
    document.querySelector(".info").innerHTML =
      '<p style="padding:40px 0;text-align:center;color:#767676;">This item could not be found — it may have been removed.</p>';
    return;
  }

  // ---- Gallery ----
  const track = document.getElementById("galleryTrack");
  const images = product.images && product.images.length ? product.images : [];
  track.innerHTML = images.map(url =>
    `<div class="gallery-slide"><img src="${url}" alt="${product.title || ''}"></div>`
  ).join("") || '<div class="gallery-slide"></div>';
  setupGalleryDots(images.length || 1);

  // ---- Condition badge + overlay ----
  document.getElementById("conditionBadge").textContent = product.condition || "—";
  document.getElementById("soldOverlay").style.display = product.status === "live" ? "none" : "flex";

  // ---- Brand / title / stock pill ----
  document.getElementById("brandLabel").textContent = product.brand || "";
  document.getElementById("titleLabel").textContent = product.title || "";
  const stockPill = document.getElementById("stockPill");
  const isLive = product.status === "live";
  stockPill.textContent = isLive ? "Only 1 left" : "Sold Out";
  stockPill.classList.toggle("sold-out", !isLive);

  // ---- Price ----
  document.getElementById("priceNow").textContent = formatNaira(product.price);
  const origEl = document.getElementById("priceOriginal");
  const saveEl = document.getElementById("priceSave");
  if (product.originalPrice && product.originalPrice > product.price) {
    origEl.textContent = formatNaira(product.originalPrice);
    origEl.style.display = "inline";
    const pct = Math.round((1 - product.price / product.originalPrice) * 100);
    saveEl.textContent = `${pct}% off retail`;
    saveEl.style.display = "inline-block";
  } else {
    origEl.style.display = "none";
    saveEl.style.display = "none";
  }

  // ---- Size (informational, not selectable — one unit, one size) ----
  document.getElementById("sizeDisplay").textContent = product.size || "—";

  // ---- Condition report ----
  const list = document.getElementById("conditionList");
  const notes = product.conditionChecklist && product.conditionChecklist.length
    ? product.conditionChecklist
    : (product.conditionNotes ? [product.conditionNotes] : []);
  list.innerHTML = notes.map(n => `<li>${n}</li>`).join("");

  const thumbs = document.getElementById("detailThumbs");
  thumbs.innerHTML = (product.detailImages || [])
    .map(url => `<img src="${url}" alt="Detail close-up">`).join("");

  // ---- Description ----
  document.getElementById("descText").textContent = product.description || "";

  // ---- Sticky CTA ----
  document.getElementById("stickyPrice").textContent = formatNaira(product.price);
  const buyBtn = document.getElementById("buyBtn");
  buyBtn.textContent = isLive ? "Add to Bag" : "Sold Out";
  buyBtn.disabled = !isLive;
  buyBtn.classList.toggle("disabled", !isLive);

  // ---- Wishlist heart state ----
  updateHeartIcon(isWishlisted(productId));
  renderRelatedProducts(product);
}

async function renderRelatedProducts(product) {
  const related = document.getElementById("relatedScroll");
  if (!product || !product.category) {
    related.innerHTML = '<p style="padding:24px 0;color:#767676;">No related items available.</p>';
    return;
  }

  const { items } = await getLiveProducts({ category: product.category, pageSize: 4 });
  const filtered = items.filter(item => item.id !== product.id).slice(0, 4);

  if (filtered.length === 0) {
    related.innerHTML = '<p style="padding:24px 0;color:#767676;">No related items available.</p>';
    return;
  }

  related.innerHTML = filtered.map(item => `
    <a class="card" href="/product-details.html?id=${item.id}">
      <div class="card-image">
        <img src="${(item.images && item.images[0]) || 'https://placehold.co/300x375/ccc/ffffff?text=No+Image'}" alt="${item.title || ''}">
        <div class="card-condition">${item.condition || 'Good'}</div>
      </div>
      <div class="card-body">
        <div class="card-brand">${item.brand || ''}</div>
        <div class="card-title">${item.title || ''}</div>
        <div class="card-price-row">
          <span class="card-price">₦${Number(item.price || 0).toLocaleString()}</span>
          ${item.originalPrice ? `<span class="card-price-original">₦${Number(item.originalPrice).toLocaleString()}</span>` : ''}
        </div>
      </div>
    </a>
  `).join("");
}

function formatNaira(amount) {
  return "₦" + Number(amount || 0).toLocaleString();
}

function updateHeartIcon(active) {
  document.getElementById("heartBtn").classList.toggle("active", active);
}

// ---- Wishlist toggle ----
document.getElementById("heartBtn").addEventListener("click", function () {
  if (!productId) return;
  toggleWishlist(productId);
  updateHeartIcon(isWishlisted(productId));
});

// ---- Add to Bag ----
document.getElementById("buyBtn").addEventListener("click", function () {
  if (!currentProduct || currentProduct.status !== "live") return;
  addToCart(productId, currentProduct.size);
  // Small inline confirmation instead of a jarring alert()
  const original = this.textContent;
  this.textContent = "Added ✓";
  setTimeout(() => { this.textContent = original; }, 1200);
});

// ---- Gallery swipe (unchanged behavior, now driven by dynamic slide count) ----
const gallery = document.getElementById("gallery");
const dotsWrap = document.getElementById("galleryDots");
let galleryIndex = 0;
let startX = 0, dragging = false;

function setupGalleryDots(count) {
  dotsWrap.innerHTML = "";
  for (let i = 0; i < count; i++) {
    const d = document.createElement("span");
    if (i === 0) d.classList.add("active");
    dotsWrap.appendChild(d);
  }
  galleryIndex = 0;
}

gallery.addEventListener("touchstart", e => { startX = e.touches[0].clientX; dragging = true; }, { passive: true });
gallery.addEventListener("touchend", e => {
  if (!dragging) return;
  dragging = false;
  const delta = e.changedTouches[0].clientX - startX;
  if (delta > 40) goToSlide(galleryIndex - 1);
  else if (delta < -40) goToSlide(galleryIndex + 1);
});
function goToSlide(i) {
  const track = document.getElementById("galleryTrack");
  const count = track.children.length;
  if (count === 0) return;
  galleryIndex = (i + count) % count;
  track.style.transform = `translateX(-${galleryIndex * 100}%)`;
  Array.from(dotsWrap.children).forEach((d, j) => d.classList.toggle("active", j === galleryIndex));
}

// ---- Accordion (unchanged) ----
document.querySelectorAll("[data-accordion]").forEach(btn => {
  btn.addEventListener("click", () => btn.parentElement.classList.toggle("open"));
});

// ---- Back button ----
document.querySelector(".navbar button[aria-label='Back']").addEventListener("click", () => {
  window.history.back();
});

// ---- Auth-gated navigation (Related section "See all" etc. can reuse this later) ----
attachAuthModalTriggers(".requires-auth", () => {
  window.location.href = "/checkout.html";
});
</script>
