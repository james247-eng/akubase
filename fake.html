<body>

<div class="screen">

  <div class="header">
    <h1 class="brand">AKUBASE</h1>
  </div>

  <div class="carouse" id="carouse">
    <div class="carousel-track" id="track"></div>
    <div class="carousel-dots" id="dots"></div>
  </div>

  <div class="content">
    <p class="intro">Welcome to AKUBASE — your one-stop thrift arena. Discover curated finds at prices that make sense.</p>
    <button class="cta" id="ctaBtn">Get Started</button>

    <!-- <div class="recent-section" id="recentSection" style="display:none;">
      <h4>Recently Viewed</h4>
      <div class="recent-scroll" id="recentScroll"></div>
    </div> -->

    <p class="footer">Powered by AKUBASE</p>
  </div>

</div>

<script type="module">
import { logEvent } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js";
import { analytics } from "./config/firebase-config.js";
import { getLiveProducts } from "./js/products.js";
import { getRecentlyViewedLive } from "./js/recent-viewed.js";
import { getProductById } from "./js/products.js";

let slideData = []; // parallel array of product objects behind each carousel slide

// ---- Featured carousel, pulled from real live products ----
async function loadCarousel() {
  const { items } = await getLiveProducts({ pageSize: 5 });
  slideData = items;

  const track = document.getElementById("track");
  track.innerHTML = (items.length ? items : [null]).map(p => `
    <div class="carousel-slide" ${p ? `data-id="${p.id}"` : ""}>
      <img src="${p ? ((p.images && p.images[0]) || '') : 'https://placehold.co/600x600/680202/ffffff?text=AKUBASE'}" alt="${p ? p.title : ''}">
    </div>
  `).join("");

  setupCarouselDots(items.length || 1);
}

// ---- Recently Viewed rail — hidden entirely if empty ----
async function loadRecentlyViewed() {
  const products = await getRecentlyViewedLive(getProductById, 8);
  const section = document.getElementById("recentSection");
  const scroll = document.getElementById("recentScroll");

  if (products.length === 0) {
    section.style.display = "none";
    return;
  }

  section.style.display = "block";
  scroll.innerHTML = products.map(p => `
    <div class="recent-card" data-id="${p.id}">
      <img src="${(p.images && p.images[0]) || `https://placehold.co/200x250/680202/ffffff?text=${encodeURIComponent(p.brand || 'Item')}`}">
      <div class="rc-price">₦${Number(p.price || 0).toLocaleString()}</div>
    </div>
  `).join("");

  scroll.addEventListener("click", (e) => {
    const card = e.target.closest("[data-id]");
    if (card) window.location.href = `/product-details.html?id=${card.dataset.id}`;
  });
}

// ---- Analytics: track the primary CTA click, as requested ----
document.getElementById("ctaBtn").addEventListener("click", () => {
  if (analytics) {
    logEvent(analytics, "select_content", {
      content_type: "cta_button",
      item_id: "welcome_get_started"
    });
  }
  window.location.href = "/products.html";
});

// ---- Carousel slide click → straight to that product's PDP ----
document.getElementById("track").addEventListener("click", (e) => {
  const slide = e.target.closest("[data-id]");
  if (slide) window.location.href = `/product-details.html?id=${slide.dataset.id}`;
});

// ---- Carousel mechanics (unchanged behavior, now driven by real slide count) ----
const dotsWrap = document.getElementById("dots");
const carousel = document.getElementById("carousel");
let index = 0;
let timer = null;
const INTERVAL = 3500;

function setupCarouselDots(total) {
  dotsWrap.innerHTML = "";
  for (let i = 0; i < total; i++) {
    const b = document.createElement("button");
    if (i === 0) b.classList.add("active");
    b.addEventListener("click", (e) => { e.stopPropagation(); goTo(i); });
    dotsWrap.appendChild(b);
  }
  index = 0;
  restart();
}

function render() {
  const track = document.getElementById("track");
  track.style.transform = `translateX(-${index * 100}%)`;
  Array.from(dotsWrap.children).forEach((d, i) => d.classList.toggle("active", i === index));
}
function goTo(i) {
  const total = dotsWrap.children.length || 1;
  index = (i + total) % total;
  render();
  restart();
}
function next() { goTo(index + 1); }
function start() { timer = setInterval(next, INTERVAL); }
function stop() { clearInterval(timer); }
function restart() { stop(); start(); }

let startX = 0, dragging = false;
carousel.addEventListener("touchstart", e => { startX = e.touches[0].clientX; dragging = true; stop(); }, { passive: true });
carousel.addEventListener("touchend", e => {
  if (!dragging) return;
  dragging = false;
  const delta = e.changedTouches[0].clientX - startX;
  if (delta > 40) goTo(index - 1);
  else if (delta < -40) goTo(index + 1);
  else restart();
});

loadCarousel();
loadRecentlyViewed();
</script>

</body>
