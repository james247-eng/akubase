<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AKUBASE Admin — Order #A1041</title>
<style>
  :root{
    --maroon:#680202; --maroon-tint:#fdeceb; --ink:#181818; --muted:#767676; --line:#ececec;
    --bg:#f6f6f7; --card:#ffffff; --success:#2e7d4f; --success-bg:#eaf6ef;
    --warn:#b5750f; --warn-bg:#fdf3e3; --danger:#b3261e; --danger-bg:#fdeceb;
    --draft:#5b6b8c; --draft-bg:#eaeefd;
  }
  *{ margin:0; padding:0; box-sizing:border-box; }
  body{ font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif; background:var(--bg); color:var(--ink); }
  .shell{ display:grid; grid-template-columns:220px 1fr; min-height:100vh; }
  .sidebar{ background:#fff; border-right:1px solid var(--line); display:flex; flex-direction:column; padding:20px 14px; }
  .sidebar-logo{ font-size:1.15rem; font-weight:800; color:var(--maroon); padding:6px 10px 20px; }
  .nav-group-label{ font-size:0.66rem; font-weight:700; text-transform:uppercase; letter-spacing:0.06em; color:var(--muted); padding:14px 10px 6px; }
  .nav-link{ display:flex; align-items:center; gap:10px; padding:10px 10px; border-radius:8px; font-size:0.86rem; font-weight:600; color:var(--ink); text-decoration:none; cursor:pointer; }
  .nav-link svg{ width:17px;height:17px; flex-shrink:0; color:var(--muted); }
  .nav-link.active{ background:var(--maroon-tint); color:var(--maroon); }
  .nav-link.active svg{ color:var(--maroon); }
  .nav-link:hover:not(.active){ background:var(--bg); }
  .sidebar-foot{ margin-top:auto; display:flex; align-items:center; gap:10px; padding:12px 10px; border-top:1px solid var(--line); }
  .avatar{ width:32px;height:32px;border-radius:50%; background:var(--maroon);color:#fff; display:flex;align-items:center;justify-content:center; font-size:0.78rem;font-weight:700;flex-shrink:0; }
  .sidebar-foot .name{ font-size:0.8rem; font-weight:700; }
  .sidebar-foot .role{ font-size:0.7rem; color:var(--muted); }

  .main{ display:flex; flex-direction:column; min-width:0; }
  .topbar{ background:#fff; border-bottom:1px solid var(--line); padding:16px 28px; display:flex; align-items:center; gap:14px; }
  .back-btn{ width:34px;height:34px; border-radius:8px; border:1px solid var(--line); background:#fff; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; }
  .topbar h1{ font-size:1.05rem; font-weight:800; }
  .topbar .sub{ font-size:0.76rem; color:var(--muted); margin-top:2px; }
  .content{ padding:24px 28px; display:grid; grid-template-columns:1.5fr 1fr; gap:20px; max-width:1200px; }
  .panel{ background:var(--card); border:1px solid var(--line); border-radius:14px; padding:22px; margin-bottom:20px; }
  .panel h3{ font-size:0.92rem; font-weight:700; margin-bottom:16px; }

  .status-pill{ font-size:0.72rem; font-weight:700; padding:5px 11px; border-radius:20px; display:inline-flex; align-items:center; gap:6px; }
  .status-pill::before{ content:''; width:6px;height:6px;border-radius:50%; }
  .st-pending{ background:var(--warn-bg); color:var(--warn); } .st-pending::before{ background:var(--warn); }

  /* status timeline */
  .timeline{ display:flex; align-items:flex-start; margin-bottom:6px; }
  .tl-step{ flex:1; text-align:center; position:relative; }
  .tl-dot{ width:26px;height:26px;border-radius:50%; background:var(--line); color:#fff; display:flex; align-items:center; justify-content:center; margin:0 auto 8px; font-size:0.7rem; font-weight:700; position:relative; z-index:2; }
  .tl-step.done .tl-dot{ background:var(--success); }
  .tl-step.current .tl-dot{ background:var(--maroon); }
  .tl-line{ position:absolute; top:13px; left:-50%; width:100%; height:2px; background:var(--line); z-index:1; }
  .tl-step:first-child .tl-line{ display:none; }
  .tl-step.done .tl-line, .tl-step.current .tl-line{ background:var(--success); }
  .tl-label{ font-size:0.72rem; font-weight:600; color:var(--muted); }
  .tl-step.done .tl-label, .tl-step.current .tl-label{ color:var(--ink); }

  .status-update{ display:flex; gap:10px; margin-top:18px; }
  .status-update select{ flex:1; border:1.5px solid var(--line); border-radius:9px; padding:11px 13px; font-size:0.85rem; }
  .btn{ border:none; padding:11px 18px; border-radius:9px; font-size:0.83rem; font-weight:700; cursor:pointer; }
  .btn-primary{ background:var(--maroon); color:#fff; }

  /* items */
  .order-item{ display:flex; gap:12px; padding:12px 0; border-bottom:1px solid var(--line); }
  .order-item:last-child{ border-bottom:none; }
  .order-item img{ width:52px;height:64px; border-radius:8px; object-fit:cover; background:#f0ece7; flex-shrink:0; }
  .oi-body{ flex:1; }
  .oi-title{ font-size:0.87rem; font-weight:600; }
  .oi-meta{ font-size:0.76rem; color:var(--muted); margin-top:2px; }
  .oi-price{ font-size:0.87rem; font-weight:700; }

  .summary-row{ display:flex; justify-content:space-between; font-size:0.85rem; color:var(--muted); padding:6px 0; }
  .summary-row span:last-child{ font-weight:600; color:var(--ink); }
  .summary-row.total{ color:var(--ink); font-weight:800; font-size:1rem; border-top:1px solid var(--line); margin-top:6px; padding-top:12px; }
  .summary-row.total span:last-child{ font-weight:800; }

  /* side info */
  .info-row{ display:flex; justify-content:space-between; padding:9px 0; font-size:0.84rem; border-bottom:1px solid var(--line); }
  .info-row:last-child{ border-bottom:none; }
  .info-row .k{ color:var(--muted); }
  .info-row .v{ font-weight:600; text-align:right; max-width:60%; }

  .contact-actions{ display:flex; gap:8px; margin-top:14px; }
  .contact-actions button{ flex:1; padding:9px; border-radius:8px; border:1px solid var(--line); background:#fff; font-size:0.78rem; font-weight:700; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; }

  @media (max-width:1000px){
    .shell{ grid-template-columns:1fr; } .sidebar{ display:none; }
    .content{ grid-template-columns:1fr; }
  }
</style>
</head>
<body>
  <div class="shell">
    <div id="adminSidebarRoot"></div>

    <div class="main">
      <div class="topbar">
        <button class="back-btn" onclick="window.location.href='/admin/orders.html'"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#1a1a1a" stroke-width="2" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg></button>
        <div><h1 id="orderTitle">Order</h1><div class="sub" id="orderDate">Loading…</div></div>
        <span class="status-pill" id="statusPill" style="margin-left:auto;">—</span>
    </div>

    <div class="content">

      <div>
        <div class="panel">
          <h3>Order Status</h3>
          <div class="timeline" id="timeline">
            <div class="tl-step"><div class="tl-line"></div><div class="tl-dot">1</div><div class="tl-label">Placed</div></div>
            <div class="tl-step"><div class="tl-line"></div><div class="tl-dot">2</div><div class="tl-label">Confirmed</div></div>
            <div class="tl-step"><div class="tl-line"></div><div class="tl-dot">3</div><div class="tl-label">Shipped</div></div>
            <div class="tl-step"><div class="tl-line"></div><div class="tl-dot">4</div><div class="tl-label">Delivered</div></div>
          </div>
          <div class="status-update">
            <select id="statusSelect">
              <option value="pending">Pending</option>
              <option value="confirmed">Confirmed</option>
              <option value="shipped">Shipped</option>
              <option value="delivered">Delivered</option>
              <option value="cancelled">Cancelled</option>
            </select>
            <button class="btn btn-primary" id="updateStatusBtn">Update Status</button>
          </div>
        </div>

        <div class="panel">
          <h3 id="itemsHeading">Items</h3>
          <div id="orderItemsList"></div>
          <div class="summary-row"><span>Subtotal</span><span id="subtotalVal">₦0</span></div>
          <div class="summary-row"><span>Delivery</span><span id="deliveryVal">₦0</span></div>
          <div class="summary-row total"><span>Total</span><span id="totalVal">₦0</span></div>
        </div>
      </div>

      <div>
        <div class="panel">
          <h3>Customer</h3>
          <div class="info-row"><span class="k">Name</span><span class="v" id="custName">—</span></div>
          <div class="info-row"><span class="k">Phone</span><span class="v" id="custPhone">—</span></div>
          <div class="contact-actions">
            <button id="callBtn"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6 19.79 19.79 0 01-3.07-8.67A2 2 0 014.11 2h3a2 2 0 012 1.72c.13.96.36 1.9.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.9.34 1.85.57 2.81.7A2 2 0 0122 16.92z"/></svg>Call</button>
            <button id="whatsappBtn"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/></svg>WhatsApp</button>
          </div>
        </div>

        <div class="panel">
          <h3>Delivery Address</h3>
          <div class="info-row"><span class="k">Address</span><span class="v" id="addrVal">—</span></div>
          <div class="info-row"><span class="k">Method</span><span class="v" id="methodVal">—</span></div>
        </div>

        <div class="panel">
          <h3>Payment</h3>
          <div class="info-row"><span class="k">Method</span><span class="v" id="paymentMethodVal">—</span></div>
          <div class="info-row"><span class="k">Status</span><span class="v" id="paymentStatusVal">—</span></div>
        </div>
      </div>

    </div>
  </div>
</div>
<script type="module">
  import { renderAdminNav } from "../lib/admin-nav.js";
  import { requireAdmin } from "./js/admin-auth.js";
  import { initOrderDetails } from "./js/admin-order-details.js";

  renderAdminNav("order-details");
  requireAdmin(() => initOrderDetails());
</script>
</body>
</html>
